<div class="chat-confirm-overlay" id="chatConfirmOverlay" style="display:none">
  <div class="chat-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="chatConfirmTitle">
    <div class="chat-confirm-title" id="chatConfirmTitle">Delete this conversation?</div>
    <div class="chat-confirm-actions">
      <button class="chat-confirm-btn chat-confirm-cancel" id="chatConfirmCancel">Cancel</button>
      <button class="chat-confirm-btn chat-confirm-danger" id="chatConfirmDelete">Delete</button>
    </div>
  </div>
</div>
