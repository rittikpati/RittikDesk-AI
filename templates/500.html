{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Server Error - RittikDesk AI{% endblock %}

{% block dashboard_content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;padding:40px">
  <div style="width:80px;height:80px;border-radius:20px;background:rgba(255,107,107,0.1);color:var(--dash-red);display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:20px">
    <i class="fas fa-bug"></i>
  </div>
  <h1 style="font-size:2.5rem;font-weight:800;margin-bottom:4px">500</h1>
  <p style="font-size:0.9rem;color:var(--dash-text-sec);margin-bottom:20px">Something went wrong on our end. Please try again later.</p>
  <a href="{% url 'dashboard:home' %}" class="btn btn-primary rounded-pill px-4 glow-btn">
    <i class="fas fa-home me-1"></i>Back to Dashboard
  </a>
</div>
{% endblock %}
