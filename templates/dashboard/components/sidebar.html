{% load static %}
<aside class="dash-sidebar" id="dashSidebar">
    <div class="dash-sidebar-header">
        <div class="dash-logo">
            <div class="dash-logo-icon">RD</div>
            <div class="dash-logo-text">
                <span class="dash-logo-name">RittikDesk</span>
                <span class="dash-logo-ai">AI</span>
            </div>
        </div>
    </div>

    <nav class="dash-nav">
        <div class="dash-nav-section">
            <div class="dash-nav-label">Main</div>
            <a href="{% url 'dashboard:home' %}" class="dash-nav-item{% if request.resolver_match.url_name == 'home' %} active{% endif %}">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'contacts:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'contacts' %} active{% endif %}">
                <i class="fas fa-address-book"></i>
                <span>Contacts</span>
            </a>
            <a href="{% url 'leads:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'leads' %} active{% endif %}">
                <i class="fas fa-tag"></i>
                <span>Leads</span>
            </a>
            <a href="{% url 'companies:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'companies' %} active{% endif %}">
                <i class="fas fa-building"></i>
                <span>Companies</span>
            </a>
            <a href="{% url 'deals:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'deals' %} active{% endif %}">
                <i class="fas fa-handshake"></i>
                <span>Deals</span>
            </a>
            <a href="{% url 'campaigns:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'campaigns' %} active{% endif %}">
                <i class="fas fa-bullhorn"></i>
                <span>Campaigns</span>
            </a>
            <a href="{% url 'tasks:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'tasks' %} active{% endif %}">
                <i class="fas fa-check-circle"></i>
                <span>Tasks</span>
            </a>
            <a href="{% url 'calendars:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'calendars' %} active{% endif %}">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendar</span>
            </a>
            <a href="{% url 'workflows:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'workflows' %} active{% endif %}">
                <i class="fas fa-gears"></i>
                <span>Workflows</span>
            </a>
            <a href="{% url 'workflows:notifications' %}" class="dash-nav-item{% if request.resolver_match.url_name == 'notifications' %} active{% endif %}">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
            </a>
            <a href="{% url 'emails:sent' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'emails' %} active{% endif %}">
                <i class="fas fa-envelope"></i>
                <span>Emails</span>
            </a>
        </div>

        <div class="dash-nav-section">
            <div class="dash-nav-label">AI &amp; Analytics</div>
            <a href="{% url 'assistant:list' %}" class="dash-nav-item{% if request.resolver_match.app_name == 'assistant' %} active{% endif %}">
                <i class="fas fa-robot"></i>
                <span>AI Assistant</span>
            </a>
            <a href="#" class="dash-nav-item" onclick="dashComingSoon('Analytics')">
                <i class="fas fa-chart-pie"></i>
                <span>Analytics</span>
                <span class="dash-nav-badge">Soon</span>
            </a>
        </div>

        <div class="dash-nav-section">
            <div class="dash-nav-label">Workspace</div>
            <a href="#" class="dash-nav-item" onclick="dashComingSoon('Settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <div class="dash-sidebar-footer">
        <a href="#" class="dash-nav-item" id="dashLogoutLink">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sign Out</span>
        </a>
        <form id="dashLogoutForm" method="post" action="{% url 'accounts:logout' %}" style="display:none">
            {% csrf_token %}
        </form>
    </div>
</aside>
