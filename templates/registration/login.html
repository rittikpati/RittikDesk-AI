{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold"><span class="gradient-text">Welcome Back</span></h3>
                        <p class="text-muted small">Sign in to continue to your dashboard</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.errors %}
                        <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 small">
                            Invalid email or password. Please try again.
                        </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label small">Email</label>
                            <input type="email" name="username" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="{% url 'accounts:password_reset' %}" class="small text-decoration-none">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill glow-btn mb-3">Sign In</button>
                        <p class="text-center text-muted small mb-0">
                            Don't have an account? <a href="{% url 'accounts:register' %}" class="text-decoration-none">Create one</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
