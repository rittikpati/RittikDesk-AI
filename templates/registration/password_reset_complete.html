{% extends 'base.html' %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="glass-card p-5 text-center">
                    <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                    <h4 class="fw-bold">Password Reset Complete</h4>
                    <p class="text-muted small">Your password has been successfully reset.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary rounded-pill glow-btn">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
