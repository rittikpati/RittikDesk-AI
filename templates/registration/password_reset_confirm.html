{% extends 'base.html' %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold"><span class="gradient-text">Set New Password</span></h4>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small">New Password</label>
                            <input type="password" name="new_password1" class="form-control" placeholder="Enter new password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Confirm Password</label>
                            <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill glow-btn">Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
