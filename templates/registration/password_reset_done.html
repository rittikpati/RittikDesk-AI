{% extends 'base.html' %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="glass-card p-5 text-center">
                    <i class="fas fa-envelope-open-text fa-3x text-primary mb-3"></i>
                    <h4 class="fw-bold">Check Your Email</h4>
                    <p class="text-muted small">We've sent password reset instructions to your email address.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-outline-light rounded-pill">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
