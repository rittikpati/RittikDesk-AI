{% extends 'base.html' %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold"><span class="gradient-text">Reset Password</span></h4>
                        <p class="text-muted small">Enter your email and we'll send you a reset link</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill glow-btn">Send Reset Link</button>
                        <p class="text-center mt-3 mb-0"><a href="{% url 'accounts:login' %}" class="small text-decoration-none">Back to login</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
